name: Shellcheck

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Bash syntax
        run: bash -n gost-manager.sh install.sh uninstall.sh lib/*.sh tests/*.sh

      - name: Shellcheck
        run: shellcheck gost-manager.sh install.sh uninstall.sh lib/*.sh tests/*.sh

      - name: Tests
        run: bash tests/run-tests.sh
