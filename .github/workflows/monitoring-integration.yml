name: Direct Mode and Monitoring Lite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ubuntu-systemd:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Tool versions
        run: |
          shellcheck --version
          systemd-analyze --version
      - name: Inspect real Ubuntu OS metadata layout
        run: |
          ls -ld /etc /usr /usr/lib
          ls -l /etc/os-release
          readlink -f /etc/os-release
          stat /etc/os-release
          stat "$(readlink -f /etc/os-release)"
      - name: Validate real Ubuntu OS metadata preflight
        run: bash -c 'source ./setup.sh; read_os_release'
      - name: Full local gate
        run: make check
      - name: Real Linux systemd verification
        run: bash tests/test-systemd-linux.sh
