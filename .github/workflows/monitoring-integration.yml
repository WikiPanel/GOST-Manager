name: Direct Mode and Monitoring Lite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ubuntu-systemd:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Tool versions
        run: |
          shellcheck --version
          systemd-analyze --version
      - name: Full local gate
        run: make check
      - name: Real Linux systemd verification
        run: bash tests/test-systemd-linux.sh
