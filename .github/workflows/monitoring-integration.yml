name: Direct Mode and Monitoring Lite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ubuntu-systemd:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      # actions/checkout v4.2.2
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - name: Tool versions
        run: |
          shellcheck --version
          systemd-analyze --version
      - name: Inspect real Ubuntu OS metadata layout
        run: |
          ls -ld /etc /usr /usr/lib
          ls -l /etc/os-release
          readlink -f /etc/os-release
          stat /etc/os-release
          stat "$(readlink -f /etc/os-release)"
      - name: Validate real Ubuntu OS metadata preflight
        run: bash -c 'source ./setup.sh; read_os_release'
      - name: Full local gate
        run: |
          log="${RUNNER_TEMP}/make-check.log"
          if ! make check >"${log}" 2>&1; then
            tail -n 220 "${log}"
            exit 1
          fi
          tail -n 40 "${log}"
      - name: Upload failed gate diagnostics
        if: failure()
        # actions/upload-artifact v4.6.2
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: make-check-${{ matrix.os }}
          path: ${{ runner.temp }}/make-check.log
          if-no-files-found: error
          retention-days: 1
      - name: Real Linux systemd verification
        run: bash tests/test-systemd-linux.sh
